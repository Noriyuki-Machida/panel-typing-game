<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Typing Game</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b14;
      --panel: rgba(15, 23, 39, 0.94);
      --line: #2c3950;
      --text: #f7f9ff;
      --muted: #aeb8c8;
      --blue: #2f7dff;
      --pink: #ff3fa7;
      --gold: #ffc83d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 63, 167, 0.18), transparent 30%),
        radial-gradient(circle at 88% 22%, rgba(47, 125, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #070812, #07131e 58%, #0b0b18);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    main {
      width: min(100%, 880px);
      display: grid;
      gap: 18px;
    }

    header {
      display: grid;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 66px);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .version-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    a {
      min-height: 168px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      gap: 16px;
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(20, 31, 52, 0.96), var(--panel));
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.34);
      transition: transform 150ms ease, border-color 150ms ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      border-color: var(--blue);
      outline: none;
    }

    strong {
      display: block;
      font-size: 27px;
      line-height: 1.1;
    }

    span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .latest {
      border-color: rgba(255, 200, 61, 0.65);
    }

    .latest strong {
      color: var(--gold);
    }

    footer {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 720px) {
      body {
        place-items: start center;
        padding: 18px;
      }

      .version-grid {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 132px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Panel Typing Game</h1>
      <p>古い版を残したまま、新しい版も遊べる公開入口です。目的に合わせてバージョンを選んでください。</p>
    </header>

    <section class="version-grid" aria-label="バージョン選択">
      <a class="latest" href="v2.1/">
        <strong>v2.1</strong>
        <span>リズム、デモ、ランキング分離、スマホプレイ画面を含む最新版。</span>
      </a>
      <a href="v2.1/#play">
        <strong>v2.1 スマホ</strong>
        <span>スマホ標準キーボードで遊ぶプレイ専用画面。</span>
      </a>
      <a href="v1/">
        <strong>v1</strong>
        <span>最初のパネルゲーム型タイピング版。旧仕様確認用。</span>
      </a>
    </section>

    <footer>
      GitHub Pages: versioned static snapshots.
    </footer>
  </main>
</body>
</html>
